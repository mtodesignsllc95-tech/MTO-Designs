kind = "web"
previewPath = "/"
title = "Design MTO"
version = "1.0.0"
id = "artifacts/design-mto"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21511

[services.development]
run = "pnpm --filter @workspace/design-mto run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/design-mto", "run", "build" ]
publicDir = "artifacts/design-mto/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21511"
BASE_PATH = "/"
